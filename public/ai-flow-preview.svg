<svg width="540" height="400" viewBox="0 0 540 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="540" height="400" rx="16" fill="#0F172A"/>

  <!-- Top bar -->
  <rect width="540" height="56" rx="16" fill="#1E293B"/>
  <rect y="40" width="540" height="16" fill="#1E293B"/>

  <!-- Logo -->
  <rect x="20" y="14" width="28" height="28" rx="7" fill="url(#lgGrad)"/>
  <text x="34" y="32" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="white" text-anchor="middle">PF</text>
  <text x="58" y="27" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="white">Portfolio</text>
  <text x="58" y="39" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#818CF8">Forge</text>

  <!-- Step labels -->
  <text x="100" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#818CF8" text-anchor="middle">UPLOAD</text>
  <text x="270" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#818CF8" text-anchor="middle">AI PROCESSES</text>
  <text x="440" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#818CF8" text-anchor="middle">YOUR PORTFOLIO</text>

  <!-- Upload box -->
  <rect x="28" y="108" width="144" height="180" rx="12" fill="#1E293B"/>
  <rect x="40" y="120" width="120" height="80" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">📁</text>
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Drop files here</text>
  <!-- File items -->
  <rect x="40" y="210" width="120" height="22" rx="6" fill="#0F172A"/>
  <text x="52" y="225" font-family="Arial, sans-serif" font-size="8" fill="#64748B">📄 Capstone Project.pdf</text>
  <rect x="40" y="238" width="120" height="22" rx="6" fill="#0F172A"/>
  <text x="52" y="253" font-family="Arial, sans-serif" font-size="8" fill="#64748B">📊 Presentation.pptx</text>
  <rect x="40" y="266" width="120" height="22" rx="6" fill="#312E81"/>
  <text x="52" y="281" font-family="Arial, sans-serif" font-size="8" fill="#818CF8">🏆 Club Leadership.docx</text>

  <!-- Arrow 1 -->
  <line x1="182" y1="198" x2="214" y2="198" stroke="#4F46E5" stroke-width="2"/>
  <polygon points="214,193 224,198 214,203" fill="#4F46E5"/>

  <!-- AI box -->
  <rect x="198" y="108" width="144" height="180" rx="12" fill="#1E293B"/>
  <rect x="210" y="120" width="120" height="80" rx="8" fill="url(#aiGrad)"/>
  <!-- Brain/AI icon -->
  <circle cx="270" cy="155" r="22" fill="#312E81" opacity="0.6"/>
  <text x="270" y="162" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">🤖</text>
  <!-- Processing lines -->
  <rect x="210" y="212" width="120" height="6" rx="3" fill="#334155"/>
  <rect x="210" y="212" width="90" height="6" rx="3" fill="#4F46E5"/>
  <text x="270" y="234" font-family="Arial, sans-serif" font-size="7" fill="#475569" text-anchor="middle">Extracting skills...</text>
  <rect x="210" y="244" width="120" height="6" rx="3" fill="#334155"/>
  <rect x="210" y="244" width="60" height="6" rx="3" fill="#7C3AED"/>
  <text x="270" y="264" font-family="Arial, sans-serif" font-size="7" fill="#475569" text-anchor="middle">Building resume...</text>
  <rect x="210" y="274" width="120" height="6" rx="3" fill="#334155"/>
  <rect x="210" y="274" width="100" height="6" rx="3" fill="#0891B2"/>
  <text x="270" y="294" font-family="Arial, sans-serif" font-size="7" fill="#475569" text-anchor="middle">Tailoring content...</text>

  <!-- Arrow 2 -->
  <line x1="352" y1="198" x2="384" y2="198" stroke="#4F46E5" stroke-width="2"/>
  <polygon points="384,193 394,198 384,203" fill="#4F46E5"/>

  <!-- Portfolio output box -->
  <rect x="368" y="108" width="144" height="180" rx="12" fill="#1E293B"/>
  <rect x="380" y="120" width="120" height="48" rx="8" fill="url(#portGrad)"/>
  <text x="440" y="149" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">✨ Portfolio Ready</text>
  <!-- Output items -->
  <rect x="380" y="178" width="120" height="24" rx="6" fill="#065F46" opacity="0.7"/>
  <text x="440" y="194" font-family="Arial, sans-serif" font-size="8" fill="#34D399" text-anchor="middle">✓ Portfolio Page</text>
  <rect x="380" y="208" width="120" height="24" rx="6" fill="#065F46" opacity="0.7"/>
  <text x="440" y="224" font-family="Arial, sans-serif" font-size="8" fill="#34D399" text-anchor="middle">✓ Resume PDF</text>
  <rect x="380" y="238" width="120" height="24" rx="6" fill="#065F46" opacity="0.7"/>
  <text x="440" y="254" font-family="Arial, sans-serif" font-size="8" fill="#34D399" text-anchor="middle">✓ Cover Letter</text>
  <rect x="380" y="268" width="120" height="18" rx="9" fill="#4F46E5"/>
  <text x="440" y="281" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Apply to Jobs →</text>

  <!-- Bottom stats -->
  <rect x="28" y="308" width="484" height="68" rx="12" fill="#1E293B"/>
  <rect x="44" y="322" width="1" height="40" fill="#334155"/>

  <text x="110" y="340" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">60s</text>
  <text x="110" y="356" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Generation Time</text>

  <rect x="194" y="322" width="1" height="40" fill="#334155"/>
  <text x="250" y="340" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#818CF8" text-anchor="middle">10x</text>
  <text x="250" y="356" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Better Than DIY</text>

  <rect x="334" y="322" width="1" height="40" fill="#334155"/>
  <text x="390" y="340" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#34D399" text-anchor="middle">3-in-1</text>
  <text x="390" y="356" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Portfolio · Resume · Cover</text>

  <rect x="474" y="322" width="1" height="40" fill="#334155"/>

  <defs>
    <linearGradient id="lgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="portGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
</svg>
